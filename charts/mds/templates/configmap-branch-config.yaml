apiVersion: v1
kind: ConfigMap
{{- $resourceConfig := default (dict) .Values.resourceConfig }}
{{- $legacyConfig := default (dict) .Values.branchConfig }}
{{- $projectIds := ternary (default (dict) $resourceConfig.projectIds) (default (dict) $legacyConfig.projectIds) (hasKey $resourceConfig "projectIds") }}
{{- $branchIds := ternary (default (dict) $resourceConfig.branchIds) (default (dict) $legacyConfig.branchIds) (hasKey $resourceConfig "branchIds") }}
metadata:
  name: branch-config
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "mds.labels" . | nindent 4 }}
    app.kubernetes.io/component: mds
    app.kubernetes.io/managed-by: helm
data:
  branch-config.json: {{ dict "projectIds" $projectIds "branchIds" $branchIds | toJson | quote }}
